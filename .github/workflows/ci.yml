name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-test-scan:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm install
      - run: npm test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/production-app:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/production-app:${{ github.sha }}

  deploy:
    needs: build-test-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to K3s
        run: |
          # 1. Update the image tag in your local deployment.yaml file automatically
          sed -i 's|image:.*|image: ${{ secrets.DOCKER_USERNAME }}/production-app:${{ github.sha }}|g' k8s/deployment.yaml
          
          # 2. Apply the manifests to your remote Proxmox VM
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          
          # 3. Verify the rollout
          kubectl rollout status deployment/production-app
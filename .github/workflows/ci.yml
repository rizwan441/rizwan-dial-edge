name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-test-scan:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/production-app:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/production-app:${{ github.sha }}

  deploy:
    needs: build-test-scan
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to Kubernetes
        run: |
          # Update image in deployment
          sed -i "s|image:.*|image: ${{ secrets.DOCKER_USERNAME }}/production-app:${{ github.sha }}|g" k8s/deployment.yaml

          # Apply all resources
          kubectl apply -f k8s/deployment.yaml -n dev
          kubectl apply -f k8s/service.yaml -n dev
          kubectl apply -f k8s/ingress.yaml -n dev

          # Wait for rollout
          kubectl rollout status deployment/production-app -n dev
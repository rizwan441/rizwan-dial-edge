name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm install
      - run: npm test

      - name: Build Docker Image
        run: docker build -t production-app .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Image
        run: docker tag production-app ${{ secrets.DOCKER_USERNAME }}/production-app:latest

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/production-app:latest